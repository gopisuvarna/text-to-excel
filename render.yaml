services:
  - type: web
    name: inventory-ai-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false                   # set in Render dashboard

      - key: GOOGLE_SPREADSHEET_ID
        value: "1bAYXubPRoLh-NL0rORMZFhLF0ckf7CuXzyIxFwNasVI"

      - key: GOOGLE_SHEET_NAME
        value: "MasterData"

      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false                   # paste full JSON string in Render dashboard

      - key: ALLOWED_ORIGINS
        value: "https://text-to-excel-9qzx.vercel.app,http://localhost:5173"

      - key: PYTHON_VERSION
        value: "3.11"
